<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e1e2e">
  <title>openQCM Dual v2.0</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
</head>
<body>
  <!-- Top bar -->
  <header class="top-bar">
    <div class="brand">
      <img src="icons/openqcm.svg" alt="openQCM" width="28" height="28"
           onerror="this.style.display='none'">
      <div>
        <div class="brand-title">openQCM Dual V2.0</div>
        <div class="brand-subtitle">Dual Quartz Sensors</div>
      </div>
    </div>
  </header>

  <!-- Main area -->
  <div class="main-area">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <!-- Serial Connection -->
      <div class="section-label">Serial Connection</div>
      <select id="port-select">
        <option value="">No ports</option>
      </select>
      <div class="btn-row">
        <button id="refresh-btn">Refresh</button>
        <button id="connect-btn" data-connected="false">Connect</button>
      </div>

      <hr class="separator">

      <!-- Plot Controls -->
      <div class="section-label">Plot Controls</div>
      <button id="clear-btn">Clear</button>
      <button id="raw-btn">Raw Data</button>

      <hr class="separator">

      <!-- Measurement -->
      <div class="section-label">Measurement</div>
      <div class="measurement-title">Frequency #1</div>
      <div class="measurement-value" id="freq1-value">&mdash;</div>
      <div class="measurement-title">Frequency #2</div>
      <div class="measurement-value" id="freq2-value">&mdash;</div>
      <div class="measurement-title">Delta Frequency</div>
      <div class="measurement-value" id="diff-value">&mdash;</div>

      <hr class="separator">

      <!-- Data -->
      <div class="section-label">Data</div>
      <button id="save-btn" data-logging="false">Save Data</button>

      <!-- Spacer -->
      <div style="flex:1"></div>

      <!-- Browser warning -->
      <div id="serial-warning" class="warning" hidden>
        Web Serial API not supported.<br>Use Chrome or Edge.
      </div>
    </aside>

    <!-- Splitter handle -->
    <div class="splitter-handle" id="splitter-handle"></div>

    <!-- Content -->
    <main class="content">
      <div class="tab-bar">
        <button class="tab active" data-tab="qcm">QCM Monitoring</button>
        <button class="tab" data-tab="tec">Temperature</button>
      </div>

      <!-- QCM Tab -->
      <div class="tab-panel active" id="panel-qcm">
        <div id="chart-freq1" class="chart"></div>
        <div id="chart-freq2" class="chart"></div>
        <div id="chart-diff" class="chart"></div>
      </div>

      <!-- TEC Tab -->
      <div class="tab-panel" id="panel-tec">
        <div class="tec-layout">
          <div id="chart-temp" class="chart-tec"></div>
          <div class="temp-indicators">
            <span class="section-label" style="padding:0">TEC Temp:</span>
            <span class="value-label" id="tec-temp-value">&mdash;</span>
            <span class="section-label" style="padding:0">Onboard:</span>
            <span class="value-label" id="onboard-temp-value">&mdash;</span>
          </div>
          <div class="temp-controls">
            <label class="section-label" style="padding:0">Set Temperature (&deg;C):</label>
            <input type="number" id="temp-setpoint"
                   min="5" max="45" step="0.001" value="25.000"
                   style="width:100px">
            <button id="set-temp-btn">Set</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Status bar -->
  <footer class="status-bar">
    <span id="status-label">STATUS: Disconnected</span>
    <span id="last-data-label"></span>
  </footer>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>

  <!-- App entry point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
